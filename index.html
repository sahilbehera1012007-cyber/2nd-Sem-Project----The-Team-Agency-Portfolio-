<!-- start -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW Innovators | Agency Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <span class="logo"><i>PW Innovators</i></span>

    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#team">Team</a>
        <a href="#contact">Contact</a>
    </nav>

    <button id="theme-toggle">🌙</button>
</header>

<section class="hero" id="home">
    <p class="subtitle">------ WELCOME</p>
    <h1>We are <b>PW Innovators</b></h1>
    <h2>Digital Agency</h2>

    <div class="hero-buttons">
        <a href="#projects" class="btn btn-primary">Our Portfolio</a>
        <a href="#contact" class="btn btn-outline">Work With Us</a>
    </div>
</section>

    <!-- Push 5 - Uttkarsh Chambiyal: Add Contact section with form validation -->
    <section id="contact">
    <h2 class="section-title">Let's Build Something Great</h2>

    <form id="contact-form">

        <input
            type="text"
            id="name"
            placeholder="Name"
            required>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <textarea
            id="message"
            placeholder="Message"
            required></textarea>

        <button type="submit"
            class="btn btn-primary">
            Send Message
        </button>

    </form>

</section>

<script src="app.js"></script>
</body>
</html>
